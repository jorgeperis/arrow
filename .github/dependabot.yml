version: 2
updates:
- package-ecosystem: bundler
  directory: "/"
  schedule:
    interval: daily
  open-pull-requests-limit: 10
  groups:
    security:
      patterns:
        - "*"
      update-types:
        - security
    regular:
      patterns:
        - "*"
      update-types:
        - minor
        - patch
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: daily
  open-pull-requests-limit: 10
  groups:
    security:
      patterns:
        - "*"
      update-types:
        - security
    regular:
      patterns:
        - "*"
      update-types:
        - minor
        - patch
