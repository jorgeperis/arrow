<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#F7931E"/>
    </linearGradient>
  </defs>

  <!-- Arrow pointing right/forward - transparent background -->
  <g fill="url(#arrowGrad)" transform="translate(256, 256)">
    <!-- Main arrow body pointing right -->
    <polygon points="200,0 -80,-140 -80,-50 -220,0 -80,50 -80,140" />

    <!-- Speed lines behind the arrow -->
    <rect x="-250" y="-12" width="70" height="18" rx="9" opacity="0.7"/>
    <rect x="-230" y="35" width="50" height="14" rx="7" opacity="0.5"/>
    <rect x="-240" y="-55" width="60" height="14" rx="7" opacity="0.5"/>
  </g>
</svg>
